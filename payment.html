<!DOCTYPE html>
<html>
<head>
  <title>Shop With Me - Payment</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>💳 Payment</h1>

<button onclick="showCard()">Card</button>
<button onclick="showUPI()">UPI</button>

<div id="paymentForm"></div>

<script>
function showCard() {
  document.getElementById("paymentForm").innerHTML = `
    <h3>Card Payment</h3>
    <input placeholder="Card Number"><br><br>
    <input placeholder="Expiry"><br><br>
    <input placeholder="CVV"><br><br>
    <button onclick="payNow()">Pay</button>
  `;
}

function showUPI() {
  document.getElementById("paymentForm").innerHTML = `
    <h3>UPI Payment</h3>
    <input placeholder="UPI ID"><br><br>
    <button onclick="payNow()">Pay</button>
  `;
}

function payNow() {
  alert("Processing...");
  setTimeout(() => {
    alert("Payment Successful 🎉");
    window.location.href = "receipt.html";
  }, 2000);
}
</script>

</body>
</html>
